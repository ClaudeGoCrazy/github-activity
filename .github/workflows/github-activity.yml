name: GitHub Activity

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"  # Every 3 hours

jobs:
  generate_commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set Up Git User
        run: |
          git config --global user.name "ClaudeGoCrazy"
          git config --global user.email "cfelix@lsu.edu"

      - name: Fetch Latest Commits (Prevents Conflicts)
        run: |
          git fetch --unshallow
          git pull origin main || true

      - name: Add Contributions
        run: |
          for i in $(seq 1 $(shuf -i 3-7 -n 1)); do
            echo "GitHub Activity Update: $(date -u +%Y-%m-%dT%H:%M:%S)-run$i" > activity_log.txt
            git add activity_log.txt
            git commit -m "GitHub Activity Update: $(date -u +%Y-%m-%dT%H:%M:%S)-$i"
            sleep 2
          done

      - name: Push Commits to GitHub Securely
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push origin HEAD:main
